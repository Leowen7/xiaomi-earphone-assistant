<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小米智能穿戴设备助手</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: -apple-system, BlinkMacSystemFont, "MiSans", "PingFang SC", "Microsoft YaHei", sans-serif; 
            -webkit-font-smoothing: antialiased;
        }
        :root {
            --mi-orange: #FF6900;
            --mi-orange-light: #FFF5EE;
            --mi-orange-hover: #FFF0E5;
            --text-primary: #1D1D1F;
            --text-secondary: #505050;
            --text-tertiary: #8E8E93;
            --bg-page: #F5F5F7;
            --bg-card: #FFFFFF;
            --bg-gray: #F2F2F7;
            --border-light: rgba(0,0,0,0.06);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --shadow-xs: 0 1px 3px rgba(0,0,0,0.04);
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.06);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.08);
        }
        body { 
            background: var(--bg-page); 
            min-height: 100vh;
            height: auto;
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
            color: var(--text-primary);
            overflow-y: auto;
            overflow-x: hidden;
            padding: 12px;
        }

        /* 主容器 */
        .app-container { 
            width: min(1100px, calc(100vw - 24px));
            height: min(760px, calc(100vh - 24px));
            min-height: 560px;
            background: var(--bg-card); 
            border-radius: var(--radius-lg); 
            box-shadow: var(--shadow-lg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header：毛玻璃效果，全品类标题 */
        .app-header {
            height: 60px;
            padding: 0 24px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 10;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .brand-logo {
            width: 32px;
            height: 32px;
            border-radius: 9px;
            overflow: hidden;
            flex: 0 0 auto;
            box-shadow: 0 2px 6px rgba(255, 105, 0, 0.25);
        }
        .brand-logo img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }
        .brand-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
        }
        /* 分类切换：全品类预留 */
        .category-switch {
            display: flex;
            gap: 4px;
            background: var(--bg-gray);
            padding: 3px;
            border-radius: 8px;
            margin-left: 12px;
        }
        .cat-btn {
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            background: transparent;
        }
        .cat-btn.active {
            background: white;
            color: var(--mi-orange);
            box-shadow: var(--shadow-xs);
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 13px;
        }
        .online-status {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
        }
        .status-dot {
            width: 8px;
            height: 8px;
            background: #34C759;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.1); }
        }

        /* 主体布局 */
        .app-body {
            flex: 1;
            min-height: 0;
            display: flex;
            overflow: hidden;
        }

        /* 左侧边栏 */
        .sidebar {
            width: 220px;
            min-height: 0;
            background: #FAFAFA;
            border-right: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            overscroll-behavior: contain;
        }
        .nav-menu {
            padding: 12px 8px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .nav-item {
            padding: 11px 14px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 14px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
            font-weight: 500;
            position: relative;
            border-left: 3px solid transparent;
        }
        .nav-item:hover {
            background: var(--bg-gray);
            color: var(--text-primary);
        }
        .nav-item.active {
            background: var(--mi-orange-light);
            color: var(--mi-orange);
            border-left-color: var(--mi-orange);
            font-weight: 600;
        }
        .nav-icon {
            font-size: 16px;
            width: 20px;
            text-align: center;
        }
        .sidebar-section {
            padding: 16px 12px;
            border-top: 1px solid var(--border-light);
        }
        .section-title {
            font-size: 11px;
            color: var(--text-tertiary);
            font-weight: 600;
            margin-bottom: 10px;
            padding: 0 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .quick-question {
            padding: 9px 12px;
            background: var(--bg-gray);
            border-radius: var(--radius-sm);
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            cursor: pointer;
            transition: all 0.2s;
            line-height: 1.4;
        }
        .quick-question:hover {
            background: var(--mi-orange-light);
            color: var(--mi-orange);
        }
        .help-action {
            user-select: none;
        }
        .help-action:focus-visible {
            outline: 2px solid var(--mi-orange);
            outline-offset: 2px;
        }

        /* 右侧主内容区 */
        .main-content {
            flex: 1;
            min-width: 0;
            min-height: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: white;
        }
        .content-panel {
            flex: 1;
            min-height: 0;
            display: none;
            flex-direction: column;
            overflow: hidden;
            animation: fadeInUp 0.2s ease;
        }
        .content-panel.active {
            display: flex;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 问答模块 */
        .chat-container {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-messages {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 28px 32px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overscroll-behavior: contain;
            scrollbar-gutter: stable;
            -webkit-overflow-scrolling: touch;
        }
        .chat-messages::-webkit-scrollbar {
            width: 8px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: #C7C7CC;
            border-radius: 4px;
        }
        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: #AEAEB2;
        }

        /* 开场引导 */
        .welcome-section {
            margin-bottom: 24px;
        }
        .welcome-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-primary);
            min-height: 32px;
        }
        .typing-cursor {
            display: inline-block;
            width: 2px;
            height: 22px;
            background: var(--text-primary);
            margin-left: 2px;
            animation: blink 1s infinite;
            vertical-align: middle;
        }
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        .welcome-subtitle {
            color: var(--text-tertiary);
            font-size: 14px;
            margin-bottom: 28px;
            line-height: 1.6;
        }
        .hot-questions {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 14px;
        }
        .hot-card {
            padding: 18px;
            background: white;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: var(--shadow-sm);
            border: 1px solid transparent;
        }
        .hot-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
            border-color: rgba(255, 105, 0, 0.15);
        }
        .hot-card-icon {
            width: 36px;
            height: 36px;
            background: var(--mi-orange-light);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            margin-bottom: 12px;
            color: var(--mi-orange);
        }
        .hot-card-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }
        .hot-card-desc {
            font-size: 13px;
            color: var(--text-tertiary);
            line-height: 1.5;
        }

        /* 消息气泡：连续消息不重复名称 */
        .message {
            display: flex;
            gap: 10px;
            max-width: 70%;
            animation: messageIn 0.3s ease;
        }
        @keyframes messageIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .message.continuous {
            margin-top: -12px;
        }
        .message.continuous .avatar,
        .message.continuous .message-name {
            visibility: hidden;
        }
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            margin-top: 2px;
        }
        .avatar.bot {
            background: transparent;
            color: white;
            border-radius: 9px;
            overflow: hidden;
            box-shadow: 0 2px 6px rgba(255, 105, 0, 0.18);
        }
        .avatar.bot img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }
        .avatar.user {
            background: #E5E5EA;
            color: var(--text-secondary);
        }
        .message-body {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-width: 100%;
        }
        .message-name {
            font-size: 12px;
            color: var(--text-tertiary);
            padding: 0 4px;
            font-weight: 500;
        }
        .message.user .message-name {
            display: none;
        }
        .message-bubble {
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.6;
            word-break: break-word;
            max-width: 100%;
        }
        .message.bot .message-bubble {
            background: var(--bg-gray);
            color: var(--text-primary);
            border-top-left-radius: 6px;
        }
        .message.user .message-bubble {
            background: var(--mi-orange);
            color: white;
            border-top-right-radius: 6px;
            box-shadow: 0 2px 6px rgba(255, 105, 0, 0.2);
        }
        .message-time {
            font-size: 11px;
            color: var(--text-tertiary);
            text-align: right;
            margin-top: 2px;
            padding-right: 4px;
        }

        /* Loading动画 */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 4px 2px;
        }
        .typing-dot {
            width: 6px;
            height: 6px;
            background: var(--mi-orange);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-4px); opacity: 1; }
        }

        /* 输入区：动态placeholder */
        .chat-input-area {
            flex: 0 0 auto;
            padding: 16px 32px 20px;
            border-top: 1px solid var(--border-light);
            background: white;
            position: relative;
            z-index: 2;
        }
        .chat-product-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            padding: 9px 12px;
            border: 1px solid var(--border-light);
            border-radius: 12px;
            background: #FAFAFA;
        }
        .chat-product-label {
            flex: 0 0 auto;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
        }
        .chat-product-select {
            flex: 1;
            min-width: 0;
            border: none;
            outline: none;
            background: transparent;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            cursor: pointer;
        }
        .chat-product-tip {
            flex: 0 0 auto;
            color: var(--text-tertiary);
            font-size: 12px;
        }

        .input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            padding: 10px 14px;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            transition: all 0.2s;
            background: #FAFAFA;
        }
        .input-wrapper:focus-within {
            border-color: var(--mi-orange);
            background: white;
            box-shadow: 0 0 0 4px rgba(255, 105, 0, 0.08);
        }
        .input-actions {
            display: flex;
            gap: 6px;
            color: var(--text-tertiary);
            font-size: 18px;
        }
        .input-actions span {
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .input-actions span:hover {
            color: var(--mi-orange);
            background: var(--mi-orange-light);
        }
        #chatInput {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            font-size: 14px;
            resize: none;
            line-height: 1.6;
            max-height: 120px;
            font-family: inherit;
            color: var(--text-primary);
        }
        .send-btn {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            background: #D1D1D6;
            color: white;
            border: none;
            cursor: not-allowed;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-size: 14px;
            transform: scale(0.9);
        }
        .send-btn.active {
            background: var(--mi-orange);
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(255, 105, 0, 0.25);
            transform: scale(1);
        }
        .send-btn.active:hover {
            transform: scale(1.05);
        }
        .input-hint {
            font-size: 11px;
            color: var(--text-tertiary);
            margin-top: 8px;
            text-align: right;
        }

        /* 对比模块 */
        .compare-container {
            flex: 1;
            min-height: 0;
            height: auto;
            padding: 28px 32px 40px;
            overflow-y: auto;
            overflow-x: hidden;
            overscroll-behavior: contain;
            scrollbar-gutter: stable;
            -webkit-overflow-scrolling: touch;
        }
        .compare-container::-webkit-scrollbar {
            width: 8px;
        }
        .compare-container::-webkit-scrollbar-thumb {
            background: #C7C7CC;
            border-radius: 4px;
        }
        #compareResult {
            min-height: 0;
        }
        .compare-selector {
            display: flex;
            gap: 16px;
            align-items: center;
            padding: 20px;
            background: var(--bg-gray);
            border-radius: var(--radius-md);
            margin-bottom: 24px;
        }
        .compare-select {
            flex: 1;
            padding: 11px 14px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 14px;
            outline: none;
            background: white;
            box-shadow: var(--shadow-xs);
            color: var(--text-primary);
        }
        .compare-select:focus {
            box-shadow: 0 0 0 3px rgba(255, 105, 0, 0.15);
        }
        .vs-text {
            font-weight: 700;
            color: var(--text-tertiary);
            font-size: 15px;
        }
        .compare-btn {
            padding: 11px 26px;
            background: var(--mi-orange);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            box-shadow: 0 2px 6px rgba(255, 105, 0, 0.2);
        }
        .compare-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(255, 105, 0, 0.25);
        }
        .compare-table-wrapper {
            border-radius: var(--radius-md);
            overflow-x: auto;
            overflow-y: visible;
            box-shadow: var(--shadow-sm);
            background: white;
        }
        .compare-table {
            width: 100%;
            border-collapse: collapse;
        }
        .compare-table th, .compare-table td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-light);
            text-align: center;
            font-size: 14px;
        }
        .compare-table th {
            background: var(--mi-orange-light);
            color: var(--mi-orange);
            font-weight: 600;
            position: sticky;
            top: 0;
        }
        .compare-table tr:last-child td {
            border-bottom: none;
        }
        .compare-table tr:hover td {
            background: #FAFAFA;
        }
        .param-name {
            text-align: left;
            font-weight: 500;
            color: var(--text-secondary);
            width: 120px;
        }
        .best-value {
            color: #34C759;
            font-weight: 600;
        }
        .ai-summary-btn {
            margin-top: 16px;
            width: 100%;
            padding: 12px;
            background: white;
            border: 1px solid var(--mi-orange);
            color: var(--mi-orange);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        .ai-summary-btn:hover {
            background: var(--mi-orange-light);
        }

        /* 推荐模块 */
        .recommend-container {
            flex: 1;
            min-height: 0;
            height: auto;
            padding: 28px 32px 40px;
            overflow-y: auto;
            overflow-x: hidden;
            overscroll-behavior: contain;
            scrollbar-gutter: stable;
            -webkit-overflow-scrolling: touch;
        }
        .recommend-form {
            background: var(--bg-gray);
            padding: 24px;
            border-radius: var(--radius-md);
            margin-bottom: 24px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group:last-child {
            margin-bottom: 0;
        }
        .form-label {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-primary);
        }
        .tag-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .tag-option {
            padding: 7px 16px;
            background: white;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
            box-shadow: var(--shadow-xs);
        }
        .tag-option:hover {
            color: var(--mi-orange);
            box-shadow: var(--shadow-sm);
        }
        .tag-option.selected {
            background: var(--mi-orange);
            color: white;
            box-shadow: 0 2px 6px rgba(255, 105, 0, 0.25);
        }
        .recommend-submit {
            width: 100%;
            padding: 13px;
            background: var(--mi-orange);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            margin-top: 8px;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(255, 105, 0, 0.2);
        }
        .recommend-submit:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(255, 105, 0, 0.28);
        }
        .recommend-results {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .product-card {
            padding: 20px;
            border-radius: var(--radius-md);
            display: flex;
            gap: 16px;
            transition: all 0.25s;
            background: white;
            box-shadow: var(--shadow-sm);
        }
        .product-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        .product-image {
            width: 96px;
            height: 96px;
            padding: 8px;
            background: #FFF7F2;
            border: 1px solid #F5E8DF;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
        }
        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
        .product-image-fallback {
            font-size: 34px;
            line-height: 1;
        }
        .product-info {
            flex: 1;
        }
        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 6px;
        }
        .product-name {
            font-size: 16px;
            font-weight: 600;
        }
        .match-score {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 600;
            color: #34C759;
        }
        .score-bar {
            width: 60px;
            height: 6px;
            background: #E5E5EA;
            border-radius: 3px;
            overflow: hidden;
        }
        .score-fill {
            height: 100%;
            background: linear-gradient(90deg, #34C759, #30D158);
            border-radius: 3px;
        }
        .product-price {
            color: var(--mi-orange);
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .product-features {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 10px;
        }
        .feature-tag {
            padding: 2px 8px;
            background: #F0FDF4;
            color: #34C759;
            border-radius: 4px;
            font-size: 12px;
        }
        .product-actions {
            display: flex;
            gap: 8px;
        }
        .action-btn {
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            border: none;
            background: var(--bg-gray);
            color: var(--text-secondary);
            transition: all 0.2s;
        }
        .action-btn.primary {
            background: var(--mi-orange);
            color: white;
        }
        .action-btn:hover {
            opacity: 0.85;
        }
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-tertiary);
            font-size: 14px;
        }
        .coming-soon {
            color: var(--text-tertiary);
            font-size: 13px;
            text-align: center;
            padding: 12px;
            background: var(--bg-gray);
            border-radius: var(--radius-sm);
            margin-top: 10px;
        }

        /* P2-11：接口状态、错误提示与真实数据展示 */
        .state-card {
            padding: 42px 20px;
            text-align: center;
            color: var(--text-tertiary);
            font-size: 14px;
            line-height: 1.8;
            background: #FAFAFA;
            border: 1px dashed var(--border-light);
            border-radius: var(--radius-md);
        }
        .state-card.error {
            color: #D70015;
            background: #FFF2F2;
            border-color: rgba(215, 0, 21, 0.16);
        }
        .state-card.loading {
            color: var(--text-secondary);
        }
        .state-spinner {
            width: 22px;
            height: 22px;
            margin: 0 auto 10px;
            border: 3px solid #E5E5EA;
            border-top-color: var(--mi-orange);
            border-radius: 50%;
            animation: stateSpin 0.8s linear infinite;
        }
        @keyframes stateSpin {
            to { transform: rotate(360deg); }
        }
        .api-meta {
            margin-top: 8px;
            padding: 9px 11px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.68);
            border: 1px solid var(--border-light);
            color: var(--text-tertiary);
            font-size: 12px;
            line-height: 1.7;
        }
        .api-meta a,
        .source-link {
            color: var(--mi-orange);
            text-decoration: none;
            word-break: break-all;
        }
        .api-meta a:hover,
        .source-link:hover {
            text-decoration: underline;
        }
        .product-extra {
            color: var(--text-secondary);
            font-size: 13px;
            line-height: 1.65;
            margin-bottom: 10px;
        }
        .product-source {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-top: 8px;
        }
        .compare-source {
            text-align: center;
            line-height: 1.55;
            word-break: break-word;
        }
        .compare-source a,
        .compare-source a:visited {
            color: var(--mi-orange);
            font-weight: 500;
            text-decoration: none;
        }
        .compare-source a:hover {
            text-decoration: underline;
        }
        .compare-table td {
            max-width: 360px;
            line-height: 1.55;
            white-space: normal;
            overflow-wrap: anywhere;
        }
        .compare-table thead {
            position: sticky;
            top: 0;
            z-index: 3;
        }
        .compare-table th {
            z-index: 4;
        }
        button:disabled,
        .compare-btn:disabled,
        .recommend-submit:disabled {
            cursor: not-allowed;
            opacity: 0.55;
            transform: none !important;
            box-shadow: none !important;
        }


        @media (max-height: 680px) {
            body {
                padding: 0;
            }
            .app-container {
                width: 100vw;
                height: 100vh;
                min-height: 520px;
                border-radius: 0;
            }
        }

        @media (max-width: 820px) {
            body {
                padding: 0;
            }
            .app-container {
                width: 100vw;
                height: 100vh;
                border-radius: 0;
            }
            .sidebar {
                width: 190px;
            }
            .compare-selector {
                flex-wrap: wrap;
            }
            .compare-select {
                min-width: 220px;
            }
        }

    </style>
</head>

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')

        function displayValue(value) {
            if (value === null || value === undefined || value === '') {
                return '暂无官方信息';
            }
            if (typeof value === 'boolean') {
                return value ? '支持' : '不支持';
            }
            if (Array.isArray(value)) {
                return value.length ? value.map(displayValue).join('、') : '暂无官方信息';
            }
            if (typeof value === 'object') {
                const objectDisplayText = Object.entries(value)
                    .map(([key, val]) => `${key}：${displayValue(val)}`)
                    .join('；');
                return objectDisplayText || '暂无官方信息';
            }
            return String(value);
        }

                .replace(/\band below\b/gi, '及以下')
                .replace(/\bAndroid\b/g, 'Android')
                .replace(/\biOS\b/g, 'iOS')

        function formatCompareValue(label, value) {
            const basic = displayValue(value);
            if (basic === '暂无官方信息' || basic === '支持' || basic === '不支持') {
                return basic;
            }

            const labelText = String(label ?? '');
            const compareDisplayText = String(basic).trim();

            if (labelText.includes('定位')) {
                return translateCompareToken(compareDisplayText);
            }

            if (labelText.includes('运动功能')) {
                const parts = compareDisplayText
                    .split(/\s*[,，、;；]\s*/)
                    .map(translateCompareToken)
                    .filter(Boolean);
                return parts.length ? parts.join('、') : '暂无官方信息';
            }

            if (labelText.includes('系统兼容')) {
                return formatCompatibilityText(compareDisplayText);
            }

            if (labelText.includes('表带材质') || labelText.includes('腕带材质')) {
                return compareDisplayText
                    .split(/\s*[/,，、;；]\s*/)
                    .map(translateCompareToken)
                    .filter(Boolean)
                    .join(' / ');
            }

            if (labelText.includes('货币')) {
                return translateCompareToken(compareDisplayText);
            }

            return translateCompareToken(compareDisplayText);
        }

        async function requestJson(path, options = {}) {
            const config = {...options};
            config.headers = {
                'Accept': 'application/json',
                ...(config.body ? {'Content-Type': 'application/json'} : {}),
                ...(config.headers || {})
            };

            let response;
            try {
                response = await fetch(apiUrl(path), config);
            } catch (error) {
                throw new Error('无法连接后端服务，请确认 Flask 服务已启动。');
            }

            const contentType = response.headers.get('content-type') || '';
            let payload = null;
            if (response.status !== 204) {
                try {
                    payload = contentType.includes('application/json')
                        ? await response.json()
                        : await response.text();
                } catch (error) {
                    payload = null;
                }
            }

            if (!response.ok) {
                const detail = typeof payload === 'object' && payload
                    ? payload.message || payload.error || payload.detail
                    : payload;
                throw new Error(detail || `接口请求失败（HTTP ${response.status}）`);
            }
            return payload;
        }

        function unwrapPayload(raw) {
            if (raw && typeof raw === 'object' && !Array.isArray(raw)) {
                if (raw.data !== undefined) return raw.data;
                if (raw.result !== undefined) return raw.result;
            }
            return raw;
        }

        function normalizeProducts(raw) {
            const payload = unwrapPayload(raw);
            let list = [];
            if (Array.isArray(payload)) {
                list = payload;
            } else if (payload && typeof payload === 'object') {
                list = payload.products || payload.items || payload.results || payload.list || [];
            }

            return list.map((item, index) => {
                if (typeof item === 'string') {
                    return {id: item, name: item, raw: item};
                }
                const id = item.id ?? item.product_id ?? item.productId ?? item.code ?? item.sku ?? item.model_id ?? `product-${index}`;
                const name = item.name ?? item.product_name ?? item.productName ?? item.model ?? item.title ?? id;
                return {
                    id: String(id),
                    name: displayValue(name),
                    source: item.official_source ?? item.source_url ?? item.source ?? item.url ?? null,
                    raw: item
                };
            }).filter(item => item.id && item.name);
        }

        function fillProductSelects(products, placeholder = '选择产品') {
            const select1 = document.getElementById('model1');
            const select2 = document.getElementById('model2');

            [select1, select2].forEach((select, index) => {
                const previousValue = select.value;
                select.innerHTML = '';

                const first = document.createElement('option');
                first.value = '';
                first.textContent = index === 0
                    ? `选择第一款${catConfig[currentCat].name}`
                    : `选择第二款${catConfig[currentCat].name}`;
                select.appendChild(first);

                products.forEach(product => {
                    const option = document.createElement('option');
                    option.value = product.id;
                    option.textContent = product.name;
                    select.appendChild(option);
                });

                if (!products.length) {
                    first.textContent = placeholder;
                } else if (products.some(product => product.id === previousValue)) {
                    select.value = previousValue;
                }
            });

            const previousChatValue = chatProductSelect.value;
            chatProductSelect.innerHTML = '';

            // 第一项固定为通用对话；value 为空时，后端进入 general 模式。
            const generalOption = document.createElement('option');
            generalOption.value = '';
            generalOption.textContent = '通用对话（不使用产品知识库）';
            chatProductSelect.appendChild(generalOption);

            products.forEach(product => {
                const option = document.createElement('option');
                option.value = product.id;
                option.textContent = `${product.id}｜${product.name}`;
                chatProductSelect.appendChild(option);
            });

            // 当前产品仍存在时保留选择，否则回到通用对话。
            if (
                previousChatValue
                && products.some(product => product.id === previousChatValue)
            ) {
                chatProductSelect.value = previousChatValue;
            } else {
                chatProductSelect.value = '';
            }
        }

            if (!force && productCache[cat].length) {
                fillProductSelects(productCache[cat]);
                return;
            }

            fillProductSelects([], '产品名单加载中…');
            compareButton.disabled = true;
            setState(compareResult, 'loading', '正在通过 /api/products 加载产品名单…');

            const query = new URLSearchParams({
                category: config.apiCategory,
                product_type: config.apiCategory
            });

            try {
                const raw = await requestJson(`${API_ENDPOINTS.products}?${query.toString()}`, {method: 'GET'});
                if (seq !== productLoadSeq || currentCat !== cat) return;

                const products = normalizeProducts(raw);
                productCache[cat] = products;
                fillProductSelects(products);

                if (!products.length) {
                    setState(compareResult, 'empty', '接口已返回，但当前分类暂无产品数据。');
                    compareButton.disabled = true;
                    return;
                }

                compareButton.disabled = false;
                setState(compareResult, 'empty', '请选择两款产品开始参数对比。');
            } catch (error) {
                if (seq !== productLoadSeq || currentCat !== cat) return;
                productCache[cat] = [];
                fillProductSelects([], '产品接口加载失败');
                compareButton.disabled = true;
                setState(compareResult, 'error', `产品名单加载失败：${error.message}`);
            }
        }

        function normalizeSources(value) {
            if (value === null || value === undefined || value === '') return [];
            const list = Array.isArray(value) ? value : [value];
            const seen = new Set();

            return list.map(item => {
                if (typeof item === 'string') {
                    const isUrl = /^https?:\/\//i.test(item);
                    return {
                        label: isUrl ? '官方来源' : item,
                        url: isUrl ? item : null
                    };
                }

                if (!item || typeof item !== 'object') return null;

                return {
                    label: displayValue(
                        item.source_name ??
                        item.section ??
                        item.source_file ??
                        item.title ??
                        item.name ??
                        item.label ??
                        '官方来源'
                    ),
                    url:
                        item.url ??
                        item.link ??
                        item.source_url ??
                        item.official_url ??
                        null
                };
            }).filter(source => {
                if (!source) return false;

                const key = source.url
                    ? `url:${source.url}`
                    : `label:${source.label}`;

                if (seen.has(key)) return false;
                seen.add(key);
                return true;
            });
        }

        function sourceHtml(sources) {
            const normalized = normalizeSources(sources);
            if (!normalized.length) return '暂无官方信息';

            return normalized.map(source => {
                const label = escapeHtml(source.label);
                if (!source.url) return label;
                return `<a href="${escapeHtml(source.url)}" target="_blank" rel="noopener noreferrer">${label}</a>`;
            }).join('；');
        }

        function normalizeChat(raw) {
            const payload = unwrapPayload(raw);
            if (typeof payload === 'string') {
                return {answer: payload, productName: null, sources: []};
            }
            if (!payload || typeof payload !== 'object') {
                return {answer: null, productName: null, sources: []};
            }

            return {
                answer: payload.answer ?? payload.response ?? payload.reply ?? payload.text ?? payload.message ?? null,
                productName:
                    payload.product_name ??
                    payload.productName ??
                    payload.product?.name ??
                    payload.matched_product?.name ??
                    null,
                sources:
                    payload.sources ??
                    payload.official_sources ??
                    payload.source_records ??
                    payload.references ??
                    payload.source ??
                    null
            };
        }

        async function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;

            const selectedProductId = chatProductSelect.value;
            const isGeneralMode = !selectedProductId;

            const categoryAtSend = currentCat;
            appendMessage('user', text);
            chatInput.value = '';
            chatInput.style.height = 'auto';
            sendBtn.classList.remove('active');

            const loadingId = appendLoading();

            try {
                const requestBody = {
                    question: text,
                    message: text
                };

                // 只有选择具体产品时才发送 product_id 和产品分类信息。
                // 通用对话不发送 product_id，由后端自动进入 general 模式。
                if (!isGeneralMode) {
                    requestBody.product_id = selectedProductId;
                    requestBody.top_k = 3;
                    requestBody.category = catConfig[categoryAtSend].apiCategory;
                    requestBody.product_type = catConfig[categoryAtSend].apiCategory;
                }

                const raw = await requestJson(API_ENDPOINTS.chat, {
                    method: 'POST',
                    body: JSON.stringify(requestBody)
                });

                removeLoading(loadingId);
                const result = normalizeChat(raw);

                if (!result.answer) {
                    appendMessage(
                        'bot',
                        '暂未检索到可用答案。',
                        isGeneralMode
                            ? null
                            : {productName: result.productName, sources: result.sources}
                    );
                    return;
                }

                appendMessage(
                    'bot',
                    result.answer,
                    isGeneralMode
                        ? null
                        : {productName: result.productName, sources: result.sources}
                );
            } catch (error) {
                removeLoading(loadingId);
                appendMessage('bot', `问答接口请求失败：${error.message}`);
            }
        }

        function firstValidUrl(...values) {
            for (const value of values) {
                if (typeof value === 'string' && /^https?:\/\//i.test(value.trim())) {
                    return value.trim();
                }
            }
            return null;
        }

        function findManualUrl(product) {
            const raw = product?.raw && typeof product.raw === 'object'
                ? product.raw
                : (product ?? {});

            const directUrl = firstValidUrl(
                raw.manual_url,
                raw.manualUrl,
                raw.user_manual_url,
                raw.userManualUrl,
                raw.user_guide_url,
                raw.userGuideUrl,
                raw.guide_url,
                raw.guideUrl,
                raw.instructions_url,
                raw.instructionsUrl
            );

            if (directUrl) return directUrl;

            const records =
                raw.source_records ??
                raw.sources ??
                raw.references ??
                [];

            if (Array.isArray(records)) {
                for (const record of records) {
                    if (!record || typeof record !== 'object') continue;

                    const descriptor = [
                        record.source_type,
                        record.type,
                        record.title,
                        record.name,
                        record.label,
                        record.description
                    ].filter(Boolean).join(' ').toLowerCase();

                    const looksLikeManual =
                        descriptor.includes('manual') ||
                        descriptor.includes('user guide') ||
                        descriptor.includes('guide') ||
                        descriptor.includes('说明书') ||
                        descriptor.includes('用户指南');

                    if (!looksLikeManual) continue;

                    const url = firstValidUrl(
                        record.url,
                        record.link,
                        record.source_url,
                        record.official_url,
                        record.manual_url
                    );

                    if (url) return url;
                }
            }

            return null;
        }

        function specsObject(product) {

        function normalizeCompareRows(raw, leftProduct, rightProduct) {
            const payload = unwrapPayload(raw);
            let leftName = leftProduct.name;
            let rightName = rightProduct.name;
            let rows = [];
            let sources = {
                left: leftProduct.source ?? null,
                right: rightProduct.source ?? null
            };

            const productList =
                payload && typeof payload === 'object' && Array.isArray(payload.products)
                    ? payload.products
                    : [];

            const leftBackendProduct =
                productList.find(item =>
                    String(item?.product_id ?? item?.id ?? '') === String(leftProduct.id)
                ) ?? productList[0] ?? null;

            const rightBackendProduct =
                productList.find(item =>
                    String(item?.product_id ?? item?.id ?? '') === String(rightProduct.id)
                ) ?? productList[1] ?? null;

            if (leftBackendProduct) {
                leftName = displayValue(
                    leftBackendProduct.product_name ??
                    leftBackendProduct.name ??
                    leftName
                );
                sources.left =
                    leftBackendProduct.official_url ??
                    leftBackendProduct.official_source ??
                    leftBackendProduct.source_url ??
                    leftBackendProduct.source ??
                    sources.left;
            }

            if (rightBackendProduct) {
                rightName = displayValue(
                    rightBackendProduct.product_name ??
                    rightBackendProduct.name ??
                    rightName
                );
                sources.right =
                    rightBackendProduct.official_url ??
                    rightBackendProduct.official_source ??
                    rightBackendProduct.source_url ??
                    rightBackendProduct.source ??
                    sources.right;
            }

            if (payload && typeof payload === 'object' && !Array.isArray(payload)) {
                leftName =
                    payload.product1_name ??
                    payload.left_name ??
                    payload.product1?.product_name ??
                    payload.product1?.name ??
                    payload.left_product?.product_name ??
                    payload.left_product?.name ??
                    leftName;

                rightName =
                    payload.product2_name ??
                    payload.right_name ??
                    payload.product2?.product_name ??
                    payload.product2?.name ??
                    payload.right_product?.product_name ??
                    payload.right_product?.name ??
                    rightName;

                sources.left =
                    payload.product1?.official_url ??
                    payload.product1?.official_source ??
                    payload.product1?.source_url ??
                    payload.product1?.source ??
                    payload.left_product?.official_url ??
                    payload.left_product?.official_source ??
                    payload.left_product?.source_url ??
                    payload.left_product?.source ??
                    payload.left_source ??
                    sources.left;

                sources.right =
                    payload.product2?.official_url ??
                    payload.product2?.official_source ??
                    payload.product2?.source_url ??
                    payload.product2?.source ??
                    payload.right_product?.official_url ??
                    payload.right_product?.official_source ??
                    payload.right_product?.source_url ??
                    payload.right_product?.source ??
                    payload.right_source ??
                    sources.right;

                const candidateRows =
                    payload.comparison ??
                    payload.rows ??
                    payload.parameters ??
                    payload.items ??
                    payload.differences;

                if (Array.isArray(candidateRows)) {
                    rows = candidateRows.map((row, index) => {
                        if (!row || typeof row !== 'object') {
                            return {
                                label: `参数${index + 1}`,
                                left: row,
                                right: null,
                                best: null
                            };
                        }

                        const displayValues =
                            row.display_values && typeof row.display_values === 'object'
                                ? row.display_values
                                : {};

                        const rawValues =
                            row.values && typeof row.values === 'object'
                                ? row.values
                                : {};

                        const leftValue =
                            displayValues[leftProduct.id] ??
                            displayValues[String(leftProduct.id)] ??
                            rawValues[leftProduct.id] ??
                            rawValues[String(leftProduct.id)] ??
                            row.product1 ??
                            row.left ??
                            row.value1 ??
                            row.left_value ??
                            row.values?.[0] ??
                            row[leftProduct.id] ??
                            null;

                        const rightValue =
                            displayValues[rightProduct.id] ??
                            displayValues[String(rightProduct.id)] ??
                            rawValues[rightProduct.id] ??
                            rawValues[String(rightProduct.id)] ??
                            row.product2 ??
                            row.right ??
                            row.value2 ??
                            row.right_value ??
                            row.values?.[1] ??
                            row[rightProduct.id] ??
                            null;

                        return {
                            // 后端同时返回 field 和中文 label，优先显示中文 label。
                            label:
                                row.label ??
                                row.parameter ??
                                row.name ??
                                row.key ??
                                row.field ??
                                `参数${index + 1}`,
                            left: leftValue,
                            right: rightValue,
                            best:
                                row.best ??
                                row.best_side ??
                                row.best_product_id ??
                                null,
                            conclusion: row.conclusion ?? null
                        };
                    });
                }

                if (!rows.length) {
                    const leftObject =
                        payload.product1 ??
                        payload.left_product ??
                        leftBackendProduct;

                    const rightObject =
                        payload.product2 ??
                        payload.right_product ??
                        rightBackendProduct;

                    const leftSpecs = specsObject(leftObject);
                    const rightSpecs = specsObject(rightObject);
                    const keys = [
                        ...new Set([
                            ...Object.keys(leftSpecs),
                            ...Object.keys(rightSpecs)
                        ])
                    ];

                    rows = keys.map(key => ({
                        label: key,
                        left: leftSpecs[key],
                        right: rightSpecs[key],
                        best: null
                    }));
                }

                if (
                    !rows.length &&
                    payload.comparison &&
                    typeof payload.comparison === 'object'
                ) {
                    rows = Object.entries(payload.comparison).map(
                        ([key, value]) => ({
                            label: value?.label ?? key,
                            left:
                                value?.display_values?.[leftProduct.id] ??
                                value?.values?.[leftProduct.id] ??
                                value?.product1 ??
                                value?.left ??
                                value?.[0] ??
                                null,
                            right:
                                value?.display_values?.[rightProduct.id] ??
                                value?.values?.[rightProduct.id] ??
                                value?.product2 ??
                                value?.right ??
                                value?.[1] ??
                                null,
                            best: value?.best ?? null,
                            conclusion: value?.conclusion ?? null
                        })
                    );
                }
            }

            if (Array.isArray(payload)) {
                rows = payload.map((row, index) => ({
                    label:
                        row?.label ??
                        row?.parameter ??
                        row?.name ??
                        row?.field ??
                        `参数${index + 1}`,
                    left:
                        row?.display_values?.[leftProduct.id] ??
                        row?.values?.[leftProduct.id] ??
                        row?.product1 ??
                        row?.left ??
                        row?.value1 ??
                        null,
                    right:
                        row?.display_values?.[rightProduct.id] ??
                        row?.values?.[rightProduct.id] ??
                        row?.product2 ??
                        row?.right ??
                        row?.value2 ??
                        null,
                    best: row?.best ?? null,
                    conclusion: row?.conclusion ?? null
                }));
            }

            return {
                leftName,
                rightName,
                rows,
                sources
            };
        }

        function isBest(best, side, productId) {
            if (best === null || best === undefined || best === '') return false;
            const value = String(best).toLowerCase();
            if (side === 'left') {
                return ['1', 'left', 'product1'].includes(value) || String(productId) === String(best);
            }
            return ['2', 'right', 'product2'].includes(value) || String(productId) === String(best);
        }

        function renderComparison(result, leftProduct, rightProduct) {
            const container = document.getElementById('compareResult');
            if (!result.rows.length) {
                setState(container, 'empty', '接口已返回，但没有可展示的对比数据。');
                return;
            }

            const rowsHtml = result.rows.map(row => `
                <tr title="${escapeHtml(row.conclusion ?? '')}">
                    <td class="param-name">${escapeHtml(displayValue(row.label))}</td>
                    <td class="${isBest(row.best, 'left', leftProduct.id) ? 'best-value' : ''}">
                        ${escapeHtml(formatCompareValue(row.label, row.left))}
                    </td>
                    <td class="${isBest(row.best, 'right', rightProduct.id) ? 'best-value' : ''}">
                        ${escapeHtml(formatCompareValue(row.label, row.right))}
                    </td>
                </tr>
            `).join('');

            const sourceRow = `
                <tr>
                    <td class="param-name">官方来源</td>
                    <td class="compare-source">${sourceHtml(result.sources.left ?? leftProduct.source)}</td>
                    <td class="compare-source">${sourceHtml(result.sources.right ?? rightProduct.source)}</td>
                </tr>
            `;

            container.innerHTML = `
                <div class="compare-table-wrapper">
                    <table class="compare-table">
                        <thead>
                            <tr>
                                <th class="param-name">参数项</th>
                                <th>${escapeHtml(displayValue(result.leftName))}</th>
                                <th>${escapeHtml(displayValue(result.rightName))}</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${rowsHtml}
                            ${sourceRow}
                        </tbody>
                    </table>
                </div>
            `;
        }

        async function compareProducts() {
            const leftId = document.getElementById('model1').value;
            const rightId = document.getElementById('model2').value;
            const container = document.getElementById('compareResult');

            if (!leftId || !rightId) {
                setState(container, 'error', '请先选择两款产品。');
                return;
            }
            if (leftId === rightId) {
                setState(container, 'error', '请选择两款不同的产品。');
                return;
            }

            const leftProduct = getProductById(leftId);
            const rightProduct = getProductById(rightId);
            compareButton.disabled = true;
            setState(container, 'loading', '正在调用 /api/compare 获取真实对比结果…');

            try {
                const raw = await requestJson(API_ENDPOINTS.compare, {
                    method: 'POST',
                    body: JSON.stringify({
                        category: catConfig[currentCat].apiCategory,
                        product_type: catConfig[currentCat].apiCategory,
                        product_ids: [leftId, rightId],
                        product_id_1: leftId,
                        product_id_2: rightId,
                        left_product_id: leftId,
                        right_product_id: rightId
                    })
                });

                const result = normalizeCompareRows(raw, leftProduct, rightProduct);
                renderComparison(result, leftProduct, rightProduct);
            } catch (error) {
                console.error('compareProducts failed:', error);
                setState(
                    container,
                    'error',
                    `对比页面处理失败：${error?.message ?? '未知错误'}`
                );
            } finally {
                compareButton.disabled = !productCache[currentCat].length;
            }
        }

        function collectPreferences() {
            const preferences = {};
            document.querySelectorAll('#recommendForm .tag-group').forEach(group => {
                const selected = [...group.querySelectorAll('.tag-option.selected')]
                    .map(item => item.textContent.trim());
                preferences[group.dataset.key] = group.dataset.multi === 'true'
                    ? selected
                    : (selected[0] ?? null);
            });
            return preferences;
        }

        function productFallbackIcon() {
            return currentCat === 'earphone'
                ? '🎧'
                : currentCat === 'band'
                    ? '⌚'
                    : '🕒';
        }

        function localProductImageUrl(productId) {
            const safeId = String(productId ?? '')
                .trim()
                .toUpperCase()
                .replace(/[^A-Z0-9_-]/g, '');

            return safeId
                ? `/static/images/products/${safeId}.webp`
                : null;
        }

        function productImageHtml(item) {
            const imageUrl =
                item.imageUrl ??
                localProductImageUrl(item.id);

            const fallback = productFallbackIcon();

            if (!imageUrl) {
                return `
                    <div class="product-image">
                        <span class="product-image-fallback">${fallback}</span>
                    </div>
                `;
            }

            return `
                <div class="product-image">
                    <img
                        src="${escapeHtml(imageUrl)}"
                        alt="${escapeHtml(displayValue(item.name))}"
                        loading="lazy"
                        onerror="
                            this.style.display='none';
                            this.nextElementSibling.style.display='inline';
                        "
                    >
                    <span
                        class="product-image-fallback"
                        style="display:none"
                    >${fallback}</span>
                </div>
            `;
        }

        function normalizeRecommendations(raw) {
            const payload = unwrapPayload(raw);
            let list = [];
            if (Array.isArray(payload)) {
                list = payload;
            } else if (payload && typeof payload === 'object') {
                list =
                    payload.recommendations ??
                    payload.products ??
                    payload.items ??
                    payload.results ??
                    payload.list ??
                    [];
            }

            return list.map((item, index) => {
                if (typeof item === 'string') {
                    return {
                        id: `recommend-${index}`,
                        name: item,
                        price: null,
                        score: null,
                        reasons: [],
                        sources: []
                    };
                }

                const product = item.product && typeof item.product === 'object' ? item.product : item;
                return {
                    id: String(product.id ?? product.product_id ?? item.id ?? `recommend-${index}`),
                    name:
                        product.name ??
                        product.product_name ??
                        product.model ??
                        item.product_name ??
                        item.name ??
                        null,
                    price:
                        product.price ??
                        product.official_price ??
                        item.price ??
                        item.official_price ??
                        null,
                    score:
                        item.match_score ??
                        item.score ??
                        item.similarity ??
                        item.match_rate ??
                        product.match_score ??
                        null,
                    reasons:
                        item.reasons ??
                        item.reason ??
                        item.features ??
                        item.highlights ??
                        product.features ??
                        [],
                    sources:
                        item.sources ??
                        item.official_sources ??
                        item.source_records ??
                        item.source ??
                        product.official_source ??
                        product.source ??
                        null,
                    summary:
                        item.summary ??
                        item.description ??
                        item.recommendation_reason ??
                        null,
                    imageUrl:
                        product.image_url ??
                        product.imageUrl ??
                        item.image_url ??
                        item.imageUrl ??
                        null,
                    currency:
                        product.currency ??
                        item.currency ??
                        null
                };
            });
        }

        function formatProductPrice(price, currency) {
            if (price === null || price === undefined || price === '') {
                return '暂无官方信息';
            }

            const value = escapeHtml(displayValue(price));
            const code = String(currency ?? '').trim().toUpperCase();

            if (code === 'CNY') return `¥${value}`;
            if (code === 'AUD') return `A$${value}`;
            if (code === 'USD') return `$${value}`;
            if (code === 'EUR') return `€${value}`;

            return code
                ? `${value} ${escapeHtml(code)}`
                : `¥${value}`;
        }

        function formatScore(score) {
            if (score === null || score === undefined || score === '') return null;
            const number = Number(score);
            if (!Number.isFinite(number)) return String(score);
            const percent = number <= 1 ? number * 100 : number;
            return `${Math.round(percent)}% 匹配`;
        }

        function normalizeReasonList(value) {
            if (value === null || value === undefined || value === '') return [];
            if (Array.isArray(value)) return value.map(displayValue);
            if (typeof value === 'string') return [value];
            if (typeof value === 'object') {
                return Object.entries(value).map(([key, val]) => `${key}：${displayValue(val)}`);
            }
            return [displayValue(value)];
        }

        function renderRecommendations(items) {
            const container = document.getElementById('recommendResult');
            if (!items.length) {
                setState(container, 'empty', '接口已返回，但没有匹配到推荐结果。');
                return;
            }

            container.innerHTML = '';
            items.forEach(item => {
                const score = formatScore(item.score);
                const reasons = normalizeReasonList(item.reasons);
                const reasonHtml = reasons.length
                    ? reasons.map(reason => `<span class="feature-tag">✅ ${escapeHtml(reason)}</span>`).join('')
                    : '<span class="feature-tag">暂无官方信息</span>';

                const source = normalizeSources(item.sources)[0];
                const sourceAction = source?.url
                    ? `<a class="action-btn primary source-link" href="${escapeHtml(source.url)}" target="_blank" rel="noopener noreferrer">查看官方来源 →</a>`
                    : '';

                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    ${productImageHtml(item)}
                    <div class="product-info">
                        <div class="product-header">
                            <div class="product-name">${escapeHtml(displayValue(item.name))}</div>
                            ${score ? `<div class="match-score">${escapeHtml(score)}</div>` : ''}
                        </div>
                        <div class="product-price">${formatProductPrice(item.price, item.currency)}</div>
                        ${item.summary ? `<div class="product-extra">${escapeHtml(displayValue(item.summary))}</div>` : ''}
                        <div class="product-features">${reasonHtml}</div>
                        <div class="product-actions">
                            <button class="action-btn" type="button" data-compare-id="${escapeHtml(item.id)}">加入对比</button>
                            ${sourceAction}
                        </div>
                        <div class="product-source"><strong>官方来源：</strong>${sourceHtml(item.sources)}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function getRecommend() {
            const container = document.getElementById('recommendResult');
            const submit = document.querySelector('#recommendForm .recommend-submit');
            const preferences = collectPreferences();

            submit.disabled = true;
            setState(container, 'loading', '正在调用 /api/recommend 获取真实推荐结果…');

            try {
                const raw = await requestJson(API_ENDPOINTS.recommend, {
                    method: 'POST',
                    body: JSON.stringify({
                        category: catConfig[currentCat].apiCategory,
                        product_type: catConfig[currentCat].apiCategory,
                        preferences,
                        filters: preferences
                    })
                });

                const recommendations = normalizeRecommendations(raw);
                renderRecommendations(recommendations);
            } catch (error) {
                setState(container, 'error', `推荐接口请求失败：${error.message}`);
            } finally {
                submit.disabled = false;
            }
        }

        function addRecommendationToCompare(productId) {
            const products = productCache[currentCat];
            const found = products.find(product => product.id === productId);
            if (!found) {
                setState(
                    document.getElementById('compareResult'),
                    'error',
                    '该推荐产品未出现在 /api/products 返回的产品名单中，暂时无法加入对比。'
                );
                switchPage('compare');
                return;
            }

            const first = document.getElementById('model1');
            const second = document.getElementById('model2');
            if (!first.value) first.value = productId;
            else if (!second.value && first.value !== productId) second.value = productId;
            else {
                first.value = productId;
                second.value = '';
            }
            switchPage('compare');
        }

        document.querySelectorAll('.cat-btn').forEach(button => {
            button.addEventListener('click', () => switchCategory(button.dataset.cat));
        });

        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => switchPage(item.dataset.panel));
        });

        chatInput.addEventListener('input', () => {
            chatInput.style.height = 'auto';
            chatInput.style.height = `${Math.min(chatInput.scrollHeight, 120)}px`;
            sendBtn.classList.toggle('active', Boolean(chatInput.value.trim()));
        });

        chatInput.addEventListener('keydown', event => {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        });

        document.addEventListener('click', event => {
            if (event.target.classList.contains('tag-option')) {
                const group = event.target.parentElement;
                const isMulti = group.dataset.multi === 'true';
                if (!isMulti) {
                    group.querySelectorAll('.tag-option').forEach(tag => tag.classList.remove('selected'));
                }
                event.target.classList.toggle('selected');
            }

            const compareId = event.target.dataset?.compareId;
            if (compareId) addRecommendationToCompare(compareId);
        });

        window.addEventListener('load', async () => {
            bindHelpAction('openProductManual', openCurrentProductManual);
            bindHelpAction('openCustomerService', openXiaomiCustomerService);

            typeText(
                document.getElementById('welcomeTitle'),
                `${getGreeting()}，我是小米${catConfig.earphone.greet} 👋`
            );
            renderQuickQuestions(catConfig.earphone);
            renderHotCards(catConfig.earphone);
            renderRecommendForm(catConfig.earphone);
            rotatePlaceholder();
            setInterval(rotatePlaceholder, 3000);
            setState(
                document.getElementById('recommendResult'),
                'empty',
                '选择你的需求，一键获取个性化推荐。'
            );
            await loadProducts('earphone', true);
        });
    </script>

</body>
</html>
